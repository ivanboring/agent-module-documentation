<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eval dashboard — agent-module-documentation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📊</text></svg>" />
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <header class="site">
    <h1>📊 Eval dashboard</h1>
    <nav>
      <a href="./index.html">Catalog</a>
      <a href="./dashboard.html" class="active">Eval dashboard</a>
    </nav>
    <span class="spacer"></span>
    <span class="stat" id="stat"></span>
  </header>

  <main>
    <div class="picker">
      <label for="module"><strong>Module:</strong></label>
      <select id="module"></select>
      <label for="model"><strong>Model:</strong></label>
      <select id="model"></select>
      <span class="meta" id="meta"></span>
    </div>
    <div class="legend-note" id="legendNote"></div>
    <div class="charts" id="charts"></div>
    <h2 class="qhead">Questions</h2>
    <ol class="qlist" id="qlist"></ol>
    <div class="empty" id="empty" hidden>No modules have eval results yet.</div>
  </main>

  <script type="module" src="./src/dashboard.js"></script>
</body>
</html>
