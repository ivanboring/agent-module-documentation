<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Module catalog — agent-module-documentation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <header class="site">
    <h1>📚 Module catalog</h1>
    <nav>
      <a href="./index.html" class="active">Catalog</a>
      <a href="./dashboard.html">Eval dashboard</a>
    </nav>
    <span class="spacer"></span>
    <span class="stat" id="stat"></span>
  </header>

  <main>
    <div class="controls">
      <input type="search" id="q" placeholder="Search name, description, keyword…" autocomplete="off" />
      <select id="category"><option value="">All categories</option></select>
      <select id="tier">
        <option value="0">All popularity tiers</option>
        <option value="100">Top 100</option>
        <option value="250">Top 250</option>
        <option value="500">Top 500</option>
      </select>
      <label class="check"><input type="checkbox" id="evalsOnly" /> has evals</label>
      <label class="check"><input type="checkbox" id="resultsOnly" /> has results</label>
      <span class="count" id="count"></span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>No modules match your filters.</div>
  </main>

  <script type="module" src="./src/catalog.js"></script>
</body>
</html>
