# Canonical category taxonomy for documented modules.
# Top-level categories are seeded from Drupal.org's official module-category vocabulary
# (https://www.drupal.org/jsonapi/taxonomy_term/module_categories). Add subcategories
# organically as modules are processed. Consult this file before inventing a name so we
# never create duplicate categories/subcategories.
