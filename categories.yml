# Canonical category taxonomy for documented modules.
# Top-level categories are Drupal.org's official module-category vocabulary plus a few
# observed extras; subcategories are the finer groupings actually used across the
# documented modules (auto-reconciled from each module's data.json). Consult this file
# before inventing a category/subcategory name so we never create duplicates.

